name: Dependency Updates

on:
  schedule:
    # Run every Monday at 09:00 UTC (equivalent to 4 PM Jakarta time)
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      update-type:
        description: 'Type of update (minor, patch, all)'
        required: false
        default: 'minor'

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.1.4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update dependencies
        id: update
        run: |
          echo "Updating dependencies..."
          # Update all dependencies to latest versions (respecting semver)
          pnpm update --recursive --latest

          # Get the count of updated packages
          UPDATES=$(git diff pnpm-lock.yaml | grep -c "resolved" || echo "0")
          echo "updates=$UPDATES" >> $GITHUB_OUTPUT
          echo "Updated $UPDATES packages"

      - name: Run CI checks
        continue-on-error: true
        run: |
          echo "Running CI checks on updated dependencies..."
          pnpm lint || echo "Lint has issues"
          pnpm type-check || echo "Type check has issues"
          pnpm test:coverage --run || echo "Tests failed"
          pnpm build || echo "Build failed"

      - name: Create Pull Request
        if: steps.update.outputs.updates != '0'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies

- Update all workspace dependencies to latest versions
- Respects semantic versioning constraints
- Generated by automated dependency update workflow'
          title: 'chore: update dependencies'
          body: |
            ## 📦 Dependency Updates

            This PR contains updated dependencies for all packages in the monorepo.

            ### What Changed
            - Updated all workspace dependencies to latest available versions
            - Maintains semantic versioning constraints
            - Updates pnpm-lock.yaml with resolved versions

            ### Next Steps
            1. **Review** — Check the updated packages
            2. **Test** — Run `pnpm ci:local` to verify everything works
            3. **Verify** — Check GitHub Actions CI results
            4. **Merge** — Once all checks pass

            ### Packages Updated
            ```
            pnpm update --recursive --latest
            ```

            ### Testing
            Run locally before merge:
            ```bash
            pnpm install
            pnpm ci:local  # Full CI pipeline
            ```

            ---
            *Generated by [dependency-updates.yml](./.github/workflows/dependency-updates.yml) workflow*
          branch: chore/dependency-updates-${{ github.run_number }}
          delete-branch: true
          labels: |
            chore
            dependencies
            automated

      - name: Notify - No Updates Needed
        if: steps.update.outputs.updates == '0'
        run: |
          echo "✅ All dependencies are up to date"
          echo "No updates needed at this time"

      - name: Notify - PR Created
        if: steps.update.outputs.updates != '0'
        run: |
          echo "✅ Dependency update PR created"
          echo "Updates: ${{ steps.update.outputs.updates }} packages"
          echo "Check: https://github.com/${{ github.repository }}/pulls?q=is%3Apr+is%3Aopen+author%3Aapp%2Fgithub-actions"
