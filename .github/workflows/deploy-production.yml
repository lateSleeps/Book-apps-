name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., 1.0.0)'
        required: false

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build for Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.1.4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build:packages

      - name: Build apps (production)
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prod-build
          path: |
            apps/customer/.next
            apps/owner/.next
            packages/*/dist
          retention-days: 1

  deploy-customer:
    name: Deploy Customer App (Production)
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://customer.rara-beauty.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: prod-build

      - name: Deploy to Vercel (Production)
        uses: vercel/action@v4
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_CUSTOMER }}
          environment: production
          scope: ${{ secrets.VERCEL_ORG_ID }}
          prod: true
        env:
          VERCEL_ENV: production

  deploy-owner:
    name: Deploy Owner App (Production)
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://owner.rara-beauty.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: prod-build

      - name: Deploy to Vercel (Production)
        uses: vercel/action@v4
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_OWNER }}
          environment: production
          scope: ${{ secrets.VERCEL_ORG_ID }}
          prod: true
        env:
          VERCEL_ENV: production

  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-customer, deploy-owner]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.1.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke tests
        run: |
          echo "✅ Customer App: https://customer.rara-beauty.app"
          echo "✅ Owner App: https://owner.rara-beauty.app"
          echo "Smoke tests would run here (configure as needed)"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-customer, deploy-owner, smoke-tests]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")
          CHANGELOG=$(git log $LAST_TAG..HEAD --pretty=format:"- %h: %s (%an)" --reverse)
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            README.md
            CONTRIBUTING.md
          body: |
            ## Production Deployment ✅

            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Deployed Services
            - **Customer App**: https://customer.rara-beauty.app
            - **Owner App**: https://owner.rara-beauty.app

            ### What's Changed
            * Deployed on: ${{ github.event.head_commit.timestamp }}
            * Deployed by: ${{ github.actor }}

            See full changelog: https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}
          tag_name: ${{ github.ref_name || format('v{0}', github.run_number) }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [deploy-customer, deploy-owner, smoke-tests]
    if: always() && env.SLACK_WEBHOOK_URL != ''
    steps:
      - name: Prepare notification
        id: notify
        run: |
          STATUS="✅ Success"
          if [ "${{ needs.deploy-customer.result }}" != "success" ] || [ "${{ needs.deploy-owner.result }}" != "success" ]; then
            STATUS="❌ Failed"
          fi
          echo "STATUS=$STATUS" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "🚀 Production Deployment ${{ steps.notify.outputs.STATUS }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚀 Production Deployment*\n${{ steps.notify.outputs.STATUS }}\n\n*Apps Deployed:*\n• Customer: https://customer.rara-beauty.app\n• Owner: https://owner.rara-beauty.app\n\n*Deployed by:* ${{ github.actor }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                  }
                }
              ]
            }
        if: env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
